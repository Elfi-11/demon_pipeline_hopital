services:
  postgres-hospital:
    image: postgres:17
    container_name: demo_postgres_hospital
    environment:
      POSTGRES_USER: hospital_user
      POSTGRES_PASSWORD: hospital_pwd
      POSTGRES_DB: hospital_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_hospital_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hospital_user -d hospital_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: demo_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:latest
    container_name: demo_minio_init
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./data/csv:/csv
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb -p local/hospital-raw || true;
      mc cp /csv/*.csv local/hospital-raw/;
      echo 'CSV déposés dans le bucket hospital-raw';
      "

  airflow:
    image: apache/airflow:2.10.5-python3.12
    container_name: demo_airflow
    depends_on:
      postgres-hospital:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__CORE__EXECUTOR: "SequentialExecutor"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "sqlite:////opt/airflow/airflow.db"
      _PIP_ADDITIONAL_REQUIREMENTS: "pandas boto3 psycopg2-binary unidecode great-expectations==0.18.22"
      HOSPITAL_PG_HOST: postgres-hospital
      HOSPITAL_PG_PORT: "5432"
      HOSPITAL_PG_DB: hospital_db
      HOSPITAL_PG_USER: hospital_user
      HOSPITAL_PG_PASSWORD: hospital_pwd
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: hospital-raw
    volumes:
      - ./dags:/opt/airflow/dags
      - ./gx:/opt/airflow/gx
      - airflow_logs:/opt/airflow/logs
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
        --username admin
        --password admin
        --firstname Admin
        --lastname Demo
        --role Admin
        --email admin@example.com || true &&
      airflow scheduler &
      exec airflow webserver
      "


  grafana:
      image: grafana/grafana:latest
      container_name: demo_grafana
      depends_on:
        postgres-hospital:
          condition: service_healthy
      ports:
        - "3000:3000"
      environment:
        GF_SECURITY_ADMIN_USER: admin
        GF_SECURITY_ADMIN_PASSWORD: admin
      volumes:
        - grafana_data:/var/lib/grafana
        - ./grafana/provisioning:/etc/grafana/provisioning
      restart: unless-stopped



volumes:
  postgres_hospital_data:
  minio_data:
  airflow_logs:
  grafana_data:
